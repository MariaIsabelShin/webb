<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Perfiles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <section class="form-section">
            <h2>Crear Perfil</h2>
            <input type="text" id="inNombre" placeholder="Nombre completo">
            <input type="text" id="inCargo" placeholder="Cargo u Ocupación">
            <label>Color de fondo: <input type="color" id="inColor" value="#ffffff"></label>
            <button id="btnGenerar">Generar Tarjeta</button>
        </section>
        
        <section class="preview-section">
            <h2>Vista Previa</h2>
            <div id="cardPreview" class="card">
                <div class="avatar"></div>
                <h3 id="previewNombre">Nombre</h3>
                <p id="previewCargo">Cargo</p>
            </div>
        </section>
    </div>

    <h2 style="text-align: center;">Galería de Tarjetas</h2>
    <div id="galeria" class="galeria"></div>

    <script src="script.js"></script>
</body>
</html><style>body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    padding: 20px;
}


.main-container {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin-bottom: 40px;
}


.form-section {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
}

.form-section input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-section button {
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.form-section button:hover {
    background-color: #0056b3;
}</style><script>const btnGenerar = document.getElementById('btnGenerar');
const inNombre = document.getElementById('inNombre');
const inCargo = document.getElementById('inCargo');
const inColor = document.getElementById('inColor');

const previewNombre = document.getElementById('previewNombre');
const previewCargo = document.getElementById('previewCargo');
const cardPreview = document.getElementById('cardPreview');

const galeria = document.getElementById('galeria');


btnGenerar.addEventListener('click', function() {
    
    
    const nombre = inNombre.value || 'Nombre';
    const cargo = inCargo.value || 'Cargo';
    const color = inColor.value;

   
    previewNombre.textContent = nombre;
    previewCargo.textContent = cargo;
    cardPreview.style.backgroundColor = color;

    
    const nuevaTarjeta = document.createElement('div');
    nuevaTarjeta.classList.add('card');
    nuevaTarjeta.style.backgroundColor = color; 
    
    
    nuevaTarjeta.innerHTML = `
        <div class="avatar"></div>
        <h3>${nombre}</h3>
        <p>${cargo}</p>
    `;

   
    galeria.appendChild(nuevaTarjeta);
    
    
    inNombre.value = '';
    inCargo.value = '';
});</script>
